name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-marketplace-data:
    name: Validate marketplace data files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # The api package's test suite includes a test that validates
      # built-in.json and verified.json against the Zod schema, so this
      # step catches malformed data files before they reach `main`.
      - name: Validate marketplace data files
        run: pnpm --filter @baka/api run test

  full-test:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest
    needs: validate-marketplace-data
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        run: pnpm biome check .

      - name: Type-check
        run: pnpm -r run check-types

      - name: Test
        run: pnpm -r run test
